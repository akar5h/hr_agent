# agentagon release gate.
#
# The gate computation is real: run_gate.py runs agentagon's own
# behavioral_evals.event_signals.agent_looping logic over the committed trace exports
# under .agentagon/traces/{baseline,candidate}/ and diffs baseline (pre-fix) vs
# candidate (post-fix). It is DETERMINISTIC-ONLY -- pure computation over the traces,
# no LLM judge, no Bedrock/OpenRouter, no secrets, no repository secrets to configure.
#
# HONEST SHORTCUT: the INPUT is pre-committed trace exports, not a live pull from this
# agent's own traffic. A real integration would fetch the latest N traces per side at
# run time. See .agentagon/README.md.
name: agentagon release gate

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gate:
    # Cheap event-shape filter only -- the exact `/agentagon run` command match (which
    # needs a trim the Actions expression language has no builtin for) happens in the
    # "Check trigger" step below, gating every later step.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - name: Check trigger
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === "pull_request") {
              core.setOutput("proceed", "true");
              core.setOutput("ref", context.payload.pull_request.head.sha);
              core.setOutput("number", context.payload.pull_request.number);
              return;
            }
            const command = (context.payload.comment.body || "").trim();
            const proceed = command === "/agentagon run";
            core.setOutput("proceed", String(proceed));
            if (!proceed) return;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput("ref", pr.data.head.sha);
            core.setOutput("number", context.payload.issue.number);

      # Demo-only: a visible 20s hold so a screen recording can be started after the
      # run is triggered but before any output appears. Remove for real use.
      - name: Hold for demo recording (20s)
        if: steps.check.outputs.proceed == 'true'
        run: |
          echo "agentagon gate queued — holding 20s so the recording can start..."
          sleep 20

      - uses: actions/checkout@v4
        if: steps.check.outputs.proceed == 'true'
        with:
          ref: ${{ steps.check.outputs.ref }}

      - uses: actions/setup-python@v5
        if: steps.check.outputs.proceed == 'true'
        with:
          python-version: "3.12"

      - name: Install gate dependencies
        if: steps.check.outputs.proceed == 'true'
        working-directory: .agentagon
        run: pip install -r requirements.txt

      - name: Run agentagon release gate
        id: gate
        if: steps.check.outputs.proceed == 'true'
        working-directory: .agentagon
        continue-on-error: true
        run: python3 run_gate.py

      - name: Read ASCII report + verdict
        id: report
        if: steps.check.outputs.proceed == 'true'
        working-directory: .agentagon
        run: |
          {
            echo "ascii<<GATE_ASCII_EOF"
            cat ascii.txt
            echo "GATE_ASCII_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "verdict=$(cat verdict.txt)" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.check.outputs.proceed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = `${{ steps.report.outputs.verdict }}`.trim();
            const ascii = `${{ steps.report.outputs.ascii }}`;
            const blocked = verdict === "BLOCK";
            const review = verdict === "REVIEW";
            const marker = "<!-- agentagon-gate -->";
            // Local dev default -- the agentagon-demo release-diff UI running on
            // `npm run dev`. Swap for the hosted URL (e.g. your deployed Vercel app's
            // `/release/<pair>` page) once this is running against a real deployment;
            // see README.md "Placeholders you must fill in".
            const releaseDiffUrl = "https://neurotic-morphine-unbroken.ngrok-free.dev/";
            const status = blocked ? "🚫 BLOCK" : review ? "⚠️ REVIEW" : "✅ SHIP";
            const body = [
              marker,
              `### agentagon release gate: ${status}`,
              "",
              "```",
              ascii,
              "```",
              "",
              `[View full release diff →](${releaseDiffUrl})`,
            ].join("\n");

            const prNumber = ${{ steps.check.outputs.number }};
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail check on BLOCK verdict
        if: steps.check.outputs.proceed == 'true' && steps.report.outputs.verdict == 'BLOCK'
        run: |
          echo "agentagon release gate verdict: BLOCK"
          exit 1

      - name: Flag REVIEW verdict (non-blocking)
        if: steps.check.outputs.proceed == 'true' && steps.report.outputs.verdict == 'REVIEW'
        run: |
          echo "::warning::agentagon release gate verdict: REVIEW (see PR comment) -- not a clean pass, does not block merge"
